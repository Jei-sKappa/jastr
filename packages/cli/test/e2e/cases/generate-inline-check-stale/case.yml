id: generate-inline-check-stale
covers:
  - GEN-FR-0030.AC-0002
title: Inline --check reports a stale skill
description: >
  Shows how --mode=inline --check reports a committed file whose bytes differ as
  stale, with a suggested-fix command naming --force and --mode=inline, leaving
  the stale file unchanged.
command: ["generate", "agent-skill", "demo", "--out", "out/SKILL.md", "--mode=inline", "--check"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: Generated agent-skill at out/SKILL.md is stale; regenerate it with jastr generate agent-skill demo --out out/SKILL.md --force --mode=inline.\n"
  files:
    out/SKILL.md: expected/files/out/SKILL.md
