id: generate-argument-hint-prefix-empty
covers:
  - GEN-FR-0023.AC-0007
title: Generate rejects a whitespace-only base argument-hint-prefix
description: >
  A whitespace-only targets.agent-skill.argument-hint-prefix fails with
  invalid_target_metadata, exit 1.
command: ["generate", "agent-skill", "demo", "--out=out/SKILL.md"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: targets.agent-skill.argument-hint-prefix must not be empty or whitespace-only.\n"
