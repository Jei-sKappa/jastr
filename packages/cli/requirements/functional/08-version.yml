- id: VERSION-FR-0001
  title: Version prints package version and build SHA marker
  status: active
  description: >
    The version command prints the current package version and either a build
    SHA or the source-run `dev` marker.
  notes: >
    The build-SHA form (`<version> (<short sha>)`) is produced only from a
    bundled build where `JASTR_GIT_SHA` is injected via `bun build
    --define`. It is not reachable from the source-run e2e harness, so it is
    verified by build-time checks rather than an e2e case.
  acceptance:
    - id: AC-0001
      statement: Source-run version output is exactly the package version followed by ` (dev)`.
