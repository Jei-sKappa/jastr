id: flag-invalid-boolean
covers:
  - FLAGS-FR-0007.AC-0001
  - FLAGS-FR-0007.AC-0002
title: Reject invalid boolean value
description: Shows how a boolean input with a non-boolean value is rejected.
command: ["run", "demo", "--dry-run=yes"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: Boolean input --dry-run must be true, false, or a bare flag.\n"
