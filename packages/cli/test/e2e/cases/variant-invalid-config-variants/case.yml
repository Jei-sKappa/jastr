id: variant-invalid-config-variants
covers:
  - VAR-FR-0007.AC-0001
title: Reject a non-mapping variants section
description: A non-mapping top-level variants section fails with a stable error.
command: ["run", "review#deep"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: .jastr/config.yml variants must be a mapping.\n"
