id: generate-argument-hint-reserved-base
covers:
  - GEN-FR-0023.AC-0008
title: Generate reserves argument-hint against base passthrough
description: >
  A literal argument-hint declared in base targets.agent-skill.frontmatter is
  rejected as a reserved field with invalid_target_metadata, exit 1.
command: ["generate", "agent-skill", "demo", "--out=out/SKILL.md"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: targets.agent-skill.frontmatter must not declare `argument-hint`.\n"
