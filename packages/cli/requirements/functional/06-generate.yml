- id: GEN-FR-0001
  title: Generate agent-skill writes a wrapper skill
  status: active
  description: >
    The `generate agent-skill` command writes a minimal Agent Skill wrapper to
    an explicit output path from a template's `targets.agent-skill` metadata.
  acceptance:
    - id: AC-0001
      statement: Generate exits with code 0 for a valid template and output path.
    - id: AC-0002
      statement: Generate writes the expected Agent Skill wrapper file.
    - id: AC-0003
      statement: Generate prints the generated path and source template path.
    - id: AC-0004
      statement: Generate creates missing parent directories for the output path.

- id: GEN-FR-0002
  title: Generate requires an output path
  status: active
  description: >
    The `generate agent-skill` command requires callers to provide `--out`.
  acceptance:
    - id: AC-0001
      statement: Missing `--out` exits with code 1.
    - id: AC-0002
      statement: Missing `--out` prints an Error-prefixed stderr message.

- id: GEN-FR-0003
  title: Generate refuses overwrite without force
  status: active
  description: >
    The `generate agent-skill` command does not overwrite an existing
    destination unless `--force` is supplied.
  acceptance:
    - id: AC-0001
      statement: Existing output without `--force` exits with code 1.
    - id: AC-0002
      statement: Existing output without `--force` leaves the existing file unchanged.

- id: GEN-FR-0004
  title: Generate force overwrites existing output
  status: active
  description: >
    The `generate agent-skill` command overwrites an existing destination when
    `--force` is supplied.
  acceptance:
    - id: AC-0001
      statement: Existing output with `--force` exits with code 0.
    - id: AC-0002
      statement: Existing output with `--force` writes the generated Agent Skill wrapper.

- id: GEN-FR-0005
  title: Generate validates the template before writing
  status: active
  description: >
    The `generate agent-skill` command validates the template schema, directives,
    and includes before generating the Agent Skill wrapper output.
  acceptance:
    - id: AC-0001
      statement: An invalid template exits with code 1.
    - id: AC-0002
      statement: An invalid template prints an Error-prefixed stderr message.

- id: GEN-FR-0006
  title: Generate rejects an invalid Agent Skill name
  status: active
  description: >
    The `generate agent-skill` command validates that `targets.agent-skill.frontmatter.name`
    is a valid Agent Skill name (1-64 lowercase letters, numbers, and hyphens with no
    leading, trailing, or consecutive hyphens) before writing the output.
  acceptance:
    - id: AC-0001
      statement: An invalid Agent Skill name exits with code 1.
    - id: AC-0002
      statement: An invalid Agent Skill name prints an Error-prefixed stderr message.

- id: GEN-FR-0007
  title: Generate passes through target frontmatter and omits owned fields
  status: active
  description: >
    The generated Agent Skill wrapper frontmatter renders the required
    `targets.agent-skill.frontmatter.name` and `targets.agent-skill.frontmatter.description`,
    preserves any additional kebab-case `targets.agent-skill.frontmatter` fields, and
    omits Jastr-owned fields such as `inputs`.
  acceptance:
    - id: AC-0001
      statement: Generate writes the expected wrapper file for a template with extra frontmatter.
    - id: AC-0002
      statement: The generated wrapper omits Jastr-owned fields such as inputs.
    - id: AC-0003
      statement: The generated wrapper preserves the name, description, and extension frontmatter fields.

- id: GEN-FR-0008
  title: Generate rejects non-kebab target frontmatter fields
  status: active
  description: >
    The generated Agent Skill wrapper rejects a `targets.agent-skill.frontmatter`
    field that is not a kebab-case top-level name.
  acceptance:
    - id: AC-0001
      statement: A non-kebab-case frontmatter field exits with code 1.
    - id: AC-0002
      statement: A non-kebab-case frontmatter field prints an Error-prefixed stderr message.

- id: GEN-FR-0009
  title: Generate rejects an over-long target description
  status: active
  description: >
    The generated Agent Skill wrapper rejects a `targets.agent-skill.frontmatter.description`
    longer than 1024 characters.
  acceptance:
    - id: AC-0001
      statement: An over-long description exits with code 1.
    - id: AC-0002
      statement: An over-long description prints an Error-prefixed stderr message.

- id: GEN-FR-0010
  title: Generate rejects unsupported targets
  status: active
  description: >
    `agent-skill` is the only implemented generate target; other targets remain
    unavailable until their own specs are implemented.
  acceptance:
    - id: AC-0001
      statement: An unsupported generate target exits with code 1.
    - id: AC-0002
      statement: An unsupported generate target prints the stable Error-prefixed message.

- id: GEN-FR-0011
  title: Generate renders an Inputs section only when the template declares inputs
  status: active
  description: >
    The generated Agent Skill wrapper's command line is always the bare
    `jastr run <template-ref>` with no `$ARGUMENTS`. When the template declares
    one or more inputs the body carries a `## Inputs` section plus a
    construct-flags instruction; when it declares none the body stays lean with
    no `## Inputs` section.
  acceptance:
    - id: AC-0001
      statement: "A template that declares no inputs generates a wrapper with no Inputs section and a bare jastr run command."
    - id: AC-0002
      statement: "A template that declares one or more inputs generates a wrapper with an Inputs section and a bare jastr run command."

- id: GEN-FR-0012
  title: Generate agent-skill supports selected variants
  status: active
  description: >
    `jastr generate agent-skill <template-ref>#<variant-id>` resolves and
    validates the selected variant, merges variant Agent Skill frontmatter over
    optional base target frontmatter, uses selected locked inputs during static
    render validation, and emits a wrapper command that points at the variant
    ref.
  acceptance:
    - id: AC-0001
      statement: Variant generation writes a wrapper whose command uses `<template-ref>#<variant-id>`.
    - id: AC-0002
      statement: Variant frontmatter shallowly overrides base Agent Skill frontmatter.
    - id: AC-0003
      statement: Variant generation can succeed without base `targets.agent-skill` when variant frontmatter supplies required metadata.
    - id: AC-0004
      statement: "A variant wrapper renders an Inputs section listing the unlocked inputs when at least one declared input is not locked."
    - id: AC-0005
      statement: "A variant wrapper omits the Inputs section when all declared inputs are locked."
    - id: AC-0006
      statement: Static render validation uses selected locked input values.

- id: GEN-FR-0013
  title: Generate --check confirms an up-to-date agent-skill
  status: active
  description: >
    `generate agent-skill --check` rebuilds the wrapper in memory and
    byte-compares it against the committed file at `--out`, writing nothing.
    When the committed bytes match, the command exits 0 with a confirmation
    line.
  acceptance:
    - id: AC-0001
      statement: A --check run against a byte-identical committed file exits with code 0.
    - id: AC-0002
      statement: A --check run against a byte-identical committed file prints `agent-skill at <out> is up to date.` to stdout.
    - id: AC-0003
      status: removed
      statement: A --check run leaves the committed file unchanged.
      removedReason: >
        On the up-to-date path the committed file is byte-identical to freshly
        built content, so "leaves the file unchanged" is indistinguishable from
        a wrongful identical-byte rewrite and cannot be falsified by content
        comparison. The no-write guarantee is one code path, verified with teeth
        on the stale path by GEN-FR-0014.AC-0003, where committed bytes differ
        from fresh content.

- id: GEN-FR-0014
  title: Generate --check reports a stale agent-skill
  status: active
  description: >
    `generate agent-skill --check` reports a committed file whose bytes differ
    from freshly built content as stale, exiting 1 with the `output_stale`
    message and writing nothing. Comparison is exact bytes, so a difference only
    in trailing newline or line endings is still stale.
  acceptance:
    - id: AC-0001
      statement: A --check run against a committed file whose bytes differ exits with code 1.
    - id: AC-0002
      statement: A --check run against a stale committed file prints the output_stale Error message to stderr.
    - id: AC-0003
      statement: A --check run leaves the stale committed file unchanged.

- id: GEN-FR-0015
  title: Generate --check reports a missing agent-skill
  status: active
  description: >
    `generate agent-skill --check` reports the absence of a file at `--out` as a
    check failure, exiting 1 with the `output_missing` message and writing
    nothing.
  acceptance:
    - id: AC-0001
      statement: A --check run with no file at `--out` exits with code 1.
    - id: AC-0002
      statement: A --check run with no file at `--out` prints the output_missing Error message to stderr.

- id: GEN-FR-0016
  title: Generate --check rejects --force
  status: active
  description: >
    `--check` never writes and `--force` governs overwriting, so combining them
    is incoherent. The argv pre-validator rejects the combination with the
    `invalid_command` code.
  acceptance:
    - id: AC-0001
      statement: --check combined with --force exits with code 1.
    - id: AC-0002
      statement: "--check combined with --force prints `Error: --check cannot be combined with --force.` to stderr."

- id: GEN-FR-0017
  title: Generate --check surfaces template defects before freshness
  status: active
  description: >
    `--check` performs full template validation and the static render before it
    compares, so an invalid template fails with its own existing error and code,
    not a stale or missing error.
  acceptance:
    - id: AC-0001
      statement: A --check run against a template that lacks targets.agent-skill exits 1 with the existing missing-target metadata Error message, not a stale or missing error.

- id: GEN-FR-0018
  title: Generate --check compares variant-specific content
  status: active
  description: >
    `generate agent-skill <ref>#<variant> --check` resolves the selected variant
    and compares against the variant-specific built content (merged frontmatter
    and the variant-aware wrapper command).
  acceptance:
    - id: AC-0001
      statement: A --check run on a variant ref against byte-identical variant content exits with code 0.
    - id: AC-0002
      statement: A --check run on a variant ref against byte-identical variant content prints the up-to-date confirmation line.

- id: GEN-FR-0019
  title: Generate renders the Inputs section bullets
  status: active
  description: >
    For an input-bearing template the wrapper body lists each rendered input as
    one `## Inputs` bullet in template declaration order. Each bullet shows the
    backticked `--flag`, the type token (with enum values joined by `|`), the
    required/optional status, an optional `default:` segment for optional inputs
    with a declared default, and an optional em-dash description. No generated
    wrapper contains the literal token `$ARGUMENTS`.
  acceptance:
    - id: AC-0001
      statement: "The Inputs section lists one bullet per rendered input in template declaration order."
    - id: AC-0002
      statement: "Each bullet renders its type token (enum values joined by a pipe), required/optional status, and optional default segment."
    - id: AC-0003
      statement: "An input declaring a description renders it verbatim after an em dash; an input without one renders no description segment."
    - id: AC-0004
      statement: "No generated wrapper contains the literal token $ARGUMENTS."
