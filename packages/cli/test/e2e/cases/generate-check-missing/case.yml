id: generate-check-missing
covers:
  - GEN-FR-0015.AC-0001
  - GEN-FR-0015.AC-0002
title: Check a missing agent-skill
description: Shows how --check reports a check failure when no committed wrapper exists at --out.
command: ["generate", "agent-skill", "demo", "--out", "out/SKILL.md", "--check"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: No agent-skill found at out/SKILL.md to check; generate it with jastr generate agent-skill demo --out out/SKILL.md.\n"
