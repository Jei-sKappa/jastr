- id: LIST-FR-0001
  title: List shows the folder-first inventory with a lock overlay
  status: active
  description: >
    `jastr list` enumerates the template/group units found on disk in a root's
    `.jastr/` and joins each against that root's lock. A unit carrying a lock
    entry is shown as tracked with its `source@ref`, kind, and short commit; a
    unit with no lock entry is shown marked `local` (authored). The inventory is
    folder-first: it shows what is actually installed, not merely what the lock
    records.
  acceptance:
    - id: AC-0001
      statement: A tracked unit shows its id, kind, source@ref, and short commit; an untracked unit shows marked local.

- id: LIST-FR-0002
  title: List flags a lock entry whose unit directory is gone
  status: active
  description: >
    A lock entry whose unit directory has been removed is shown flagged
    `missing` (drift). Because enumeration is folder-first, a manually-deleted
    unit never appears as a tracked ghost — only as a flagged missing row.
  acceptance:
    - id: AC-0001
      statement: A lock entry with no unit directory is shown flagged missing and a deleted unit is never shown as tracked.

- id: LIST-FR-0003
  title: List spans both roots by default and restricts with a scope flag
  status: active
  description: >
    With no flags, `list` shows both the local and the global root as labeled
    sections, each present only if it has rows. `--local` restricts the
    inventory to the local root and `--global` restricts it to the global root.
  acceptance:
    - id: AC-0001
      statement: With no flags both roots are shown as labeled sections; --local shows only the local root and --global only the global root.

- id: LIST-FR-0004
  title: List sorts by id, reports an empty inventory, and mutates nothing
  status: active
  description: >
    Entries are sorted by id. An in-scope inventory with no installed units
    prints `No templates installed.`. `list` is read-only: it never writes
    `lock.json` or any other file and exits 0.
  acceptance:
    - id: AC-0001
      statement: Entries are sorted by id; an empty in-scope inventory prints No templates installed.; list writes nothing and exits 0.

- id: LIST-FR-0005
  title: List never treats a root-level file as a unit
  status: active
  description: >
    Enumeration skips non-directories and the root-level `config.yml` /
    `lock.json` files, so neither ever appears as an installed unit in the
    listing.
  acceptance:
    - id: AC-0001
      statement: A root containing config.yml and lock.json beside its units lists only the units, never config.yml or lock.json.
