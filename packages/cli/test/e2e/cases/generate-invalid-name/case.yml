id: generate-invalid-name
covers:
  - GEN-FR-0006.AC-0001
  - GEN-FR-0006.AC-0002
title: Generate rejects an invalid Agent Skill name
description: Shows how generate agent-skill rejects a targets.skill.name that is not a valid Agent Skill name.
command: ["generate", "agent-skill", "demo", "--out=out/SKILL.md"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: targets.skill.name must be 1-64 lowercase letters, numbers, and hyphens with no leading, trailing, or consecutive hyphens.\n"
