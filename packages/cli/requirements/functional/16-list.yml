- id: LIST-FR-0001
  title: List shows the folder-first inventory with a lock overlay
  status: active
  description: >
    `jastr list` enumerates the template/group units found on disk in a root's
    `.jastr/` and joins each against that root's lock. A unit carrying a lock
    entry is shown as tracked with its `source@ref`, kind, and short commit; a
    unit with no lock entry is shown marked `local` (authored). The inventory is
    folder-first: it shows what is actually installed, not merely what the lock
    records.
  acceptance:
    - id: AC-0001
      statement: A tracked unit shows its id, kind, source@ref, and short commit; an untracked unit shows marked local.
    - id: AC-0002
      statement: A group row is followed by its member templates as a sorted tree of indented `<group>/<template>` refs, using `├── ` for each member but the last and `└── ` for the last; member lines carry no per-member provenance.

- id: LIST-FR-0002
  title: List flags a lock entry whose unit directory is gone
  status: active
  description: >
    A lock entry whose unit directory has been removed is shown flagged
    `missing` (drift). Because enumeration is folder-first, a manually-deleted
    unit never appears as a tracked ghost — only as a flagged missing row.
  acceptance:
    - id: AC-0001
      statement: A lock entry with no unit directory is shown flagged missing and a deleted unit is never shown as tracked.

- id: LIST-FR-0003
  title: List spans both roots by default and restricts with a scope flag
  status: active
  description: >
    With no flags, `list` shows both the local and the global root as labeled
    sections, each present only if it has rows. `--local` restricts the
    inventory to the local root and `--global` restricts it to the global root.
  acceptance:
    - id: AC-0001
      statement: With no flags both roots are shown as labeled sections; --local shows only the local root and --global only the global root.

- id: LIST-FR-0004
  title: List sorts by id, reports an empty inventory, and mutates nothing
  status: active
  description: >
    Entries are sorted by id. An in-scope inventory with no installed units
    prints `No templates installed.`. `list` is read-only: it never writes
    `lock.json` or any other file and exits 0.
  acceptance:
    - id: AC-0001
      statement: Entries are sorted by id; an empty in-scope inventory prints No templates installed.; list writes nothing and exits 0.

- id: LIST-FR-0005
  title: List never treats a root-level file as a unit
  status: active
  description: >
    Enumeration skips non-directories and the root-level `config.yml` /
    `lock.json` files, so neither ever appears as an installed unit in the
    listing.
  acceptance:
    - id: AC-0001
      statement: A root containing config.yml and lock.json beside its units lists only the units, never config.yml or lock.json.

- id: LIST-FR-0006
  title: '`list --variants` renders config-defined variants; default is unchanged'
  status: active
  description: >
    `list --variants` is an opt-in flag that reads each in-scope root's
    `config.yml` and renders the config-defined variants under
    `variants.<ref>` as a sorted tree beneath each present, runnable template
    row. Variants are attached row-driven: for each present standalone unit
    (ref = its id) and on-disk group member (ref = `<group>/<member>`), `list`
    looks that ref up in the same root's `config.yml`. Standalone variants are
    direct children at the row's 2-space indent; group-member variants are
    grandchildren nested one level beneath the member line. Each variant
    renders as the bare runnable ref `<ref>#<variant-id>` (no `(variant)` tag,
    no locked-input detail, no provenance), sorted ascending by variant id with
    the `├── `/`└── ` connectors. Each section reads only its own root's
    `config.yml`. Without `--variants`, `config.yml` is not read and output is
    byte-identical to today.
  acceptance:
    - id: AC-0001
      statement: '`jastr list` without `--variants` produces byte-identical output to the pre-feature behavior, and config.yml is not read.'
    - id: AC-0002
      statement: '`jastr list --variants` follows a standalone row with the variant ids under variants.<id> in that root''s config.yml, rendered at the row''s 2-space indent as a tree using `├── ` for every variant but the last and `└── ` for the last, each line the runnable ref <id>#<variant-id>.'
    - id: AC-0003
      statement: '`jastr list --variants` follows an on-disk group-member line with the variant ids under variants.<group>/<member> in that root''s config.yml, nested one level beneath the member: prefixed `  │   ` + connector when the member is not the group''s last member, and six spaces + connector when it is; each line the runnable ref <group>/<member>#<variant-id>.'
    - id: AC-0004
      statement: Variant lines under a ref are sorted ascending by variant id (same ordering as rows/members), and a present runnable ref with no variants contributes no variant lines.
    - id: AC-0005
      statement: '`--variants` reads only the in-scope root(s)'' own config.yml: --local shows local-authored variants only, --global global-authored only, and a variant authored in one root never appears under the other root''s section.'

- id: LIST-FR-0007
  title: Variants attach only to present, runnable refs
  status: active
  description: >
    Variants attach by iterating present, runnable refs only, so a group whose
    `config.yml` defines variants for a member ref (`variants.<group>/<member>`)
    renders those variants nested under the member line, while the group
    aggregate row (the bare group name, never a runnable ref) shows no direct
    variant children. The further consequences — a `missing` row and an
    unmatched orphan `variants.<ref>` entry gain no variant lines — are emergent
    entailments of the present-runnable-ref iteration and are deliberately not
    pinned by an acceptance criterion (the forthcoming co-location constraint
    will make the orphan authoring shape illegal); a future reader must not add a
    case encoding that transitional suppression.
  acceptance:
    - id: AC-0001
      statement: For a group whose config.yml defines variants for a member ref (variants.<group>/<member>), those variants render nested under the member line, and the group aggregate row itself shows no direct variant children.

- id: LIST-FR-0008
  title: '`list --variants` validates consumed config and fails loudly'
  status: active
  description: >
    Under `--variants`, the `config.yml` that `list` reads for variant data is
    validated through the existing `invalid_config` path, reusing the exact same
    error codes and messages as the rest of the CLI. The check is row-scoped:
    only a root that has at least one present, runnable row is consulted, and a
    ref's `variants.<ref>` shape is inspected only when that ref matches a
    present runnable row. An unparseable `config.yml`, a non-mapping top-level
    `variants` section, or a non-mapping `variants.<ref>` for a consulted ref
    each fails the command with `invalid_config` and the established stable
    message. Error UX is uniform: `Error: <message>` on stderr, exit 1, empty
    stdout.
  acceptance:
    - id: AC-0001
      statement: '`jastr list --variants` against a root with a present runnable unit and an unparseable config.yml fails with exit 1, empty stdout, and stderr `Error: .jastr/config.yml could not be parsed.`'
    - id: AC-0002
      statement: '`jastr list --variants` against a root with a present runnable unit and a non-mapping top-level `variants` section fails with exit 1, empty stdout, and stderr `Error: .jastr/config.yml variants must be a mapping.`'
    - id: AC-0003
      statement: '`jastr list --variants` against a root with a present runnable ref whose `variants.<ref>` is not a mapping fails with exit 1, empty stdout, and stderr `Error: .jastr/config.yml variants.<ref> must be a mapping.` (e.g. `variants.notes`).'
