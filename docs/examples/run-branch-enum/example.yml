id: run-branch-enum
title: Select a branch from an enum input
description: Shows how `run` renders only the branch selected by `--language`.
cwd: project
command: ["run", "demo", "--language=typescript"]
expect:
  exitCode: 0
  stdoutFile: expected/stdout.md
  stderr: ""
render:
  show:
    - kind: file
      path: project/.skillrouter/demo/SKILL.template.md
      label: Template
      language: md
    - kind: command
      label: Command
      language: bash
    - kind: stdout
      label: Rendered output
      language: md