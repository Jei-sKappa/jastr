id: grouped-named-missing-marker
covers:
  - RUN-FR-0008.AC-0004
  - RUN-FR-0008.AC-0005
title: Reject a grouped named template without a marker
description: Grouped named access requires `.jastr/<group>/.jastrgroup` and never falls back to standalone lookup.
command: ["run", "team/demo"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: Template team/demo was not found. Searched local .jastr/team/templates/demo/TEMPLATE.md.\n"
