id: help-run
covers:
  - HELP-FR-0001.AC-0002
  - HELP-FR-0002.AC-0001
title: Show run help
description: Shows the run command help text and the accepted template reference families.
command: ["run", "--help"]
expect:
  exitCode: 0
  stdoutContains:
    - "Usage: jastr run"
    - "Template id"
    - "#"
    - ".md file path"
  stderr: ""
