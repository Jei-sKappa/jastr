id: generate-overwrite-refused
covers:
  - GEN-FR-0003.AC-0001
  - GEN-FR-0003.AC-0002
title: Generate refuses overwrite
description: Shows how generate refuses to overwrite an existing output file.
cwd: .
command: ["generate", "agent-skill", "demo", "--out=out/SKILL.md"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: Output file out/SKILL.md already exists. Use --force to overwrite it.\n"
  files:
    out/SKILL.md: expected/files/out/SKILL.md
