id: run-string-interpolation
title: Interpolate a string input
description: Shows how template placeholders expand declared string inputs.
cwd: project
command: ["run", "demo", "--target-file=src/index.ts"]
expect:
  exitCode: 0
  stdout: "Analyze `src/index.ts`.\n"
  stderr: ""
render:
  show:
    - kind: file
      path: project/.skillrouter/demo/SKILL.template.md
      label: Template
      language: md
    - kind: command
      label: Command
      language: bash
    - kind: stdout
      label: Rendered output
      language: md
