- id: TEMPLATE-FR-0001
  title: Templates with malformed frontmatter are rejected
  status: active
  description: >
    Frontmatter is optional, but when a template opens a `---` frontmatter fence
    it must close it with `---` on its own line; an unterminated fence is
    rejected.
  acceptance:
    - id: AC-0001
      statement: A template with an unterminated frontmatter fence exits with code 1.
    - id: AC-0002
      statement: A template with an unterminated frontmatter fence prints an Error-prefixed stderr message.

- id: TEMPLATE-FR-0002
  title: Inputs must declare requiredness explicitly
  status: active
  description: >
    Every declared input must set `required: true` or `required: false`; there
    is no implicit default.
  acceptance:
    - id: AC-0001
      statement: An input without an explicit required field exits with code 1.
    - id: AC-0002
      statement: An input without an explicit required field prints an Error-prefixed stderr message.

- id: TEMPLATE-FR-0003
  title: Unsupported input types are rejected
  status: active
  description: >
    Input definitions accept only the `string`, `boolean`, and `enum` types.
  acceptance:
    - id: AC-0001
      statement: An input with an unsupported type exits with code 1.
    - id: AC-0002
      statement: An input with an unsupported type prints an Error-prefixed stderr message.

- id: TEMPLATE-FR-0004
  title: Enum inputs must declare values
  status: active
  description: >
    An enum input must provide a non-empty `values` array.
  acceptance:
    - id: AC-0001
      statement: An enum input without values exits with code 1.
    - id: AC-0002
      statement: An enum input without values prints an Error-prefixed stderr message.

- id: TEMPLATE-FR-0005
  title: Equal-length nested fences are rejected
  status: active
  description: >
    A nested conditional container must use a shorter colon fence than its outer
    container; equal-length fences are rejected so the inner close cannot end the
    outer directive early.
  acceptance:
    - id: AC-0001
      statement: An equal-length nested conditional fence exits with code 1.
    - id: AC-0002
      statement: An equal-length nested conditional fence prints an Error-prefixed stderr message.

- id: TEMPLATE-FR-0006
  title: Branch directives must follow an open conditional group
  status: active
  description: >
    Non-blank content between branches ends the conditional group, so a later
    `else-if` or `else` is a template error.
  acceptance:
    - id: AC-0001
      statement: A branch directive after interrupting content exits with code 1.
    - id: AC-0002
      statement: A branch directive after interrupting content prints an Error-prefixed stderr message.

- id: TEMPLATE-FR-0007
  title: Condition parse errors are rejected
  status: active
  description: >
    A condition expression that is not valid Jastr condition syntax, such
    as a bare identifier instead of a `${input-name}` reference, is rejected.
  acceptance:
    - id: AC-0001
      statement: A condition parse error exits with code 1.
    - id: AC-0002
      statement: A condition parse error prints an Error-prefixed stderr message.

- id: TEMPLATE-FR-0008
  title: Conditions referencing undeclared inputs are rejected
  status: active
  description: >
    A condition may only reference inputs declared in the template frontmatter.
  acceptance:
    - id: AC-0001
      statement: A condition referencing an undeclared input exits with code 1.
    - id: AC-0002
      statement: A condition referencing an undeclared input prints an Error-prefixed stderr message.

- id: TEMPLATE-FR-0009
  title: Interpolation referencing undeclared inputs is rejected
  status: active
  description: >
    A `{{input-name}}` placeholder may only reference inputs declared in the
    template frontmatter.
  acceptance:
    - id: AC-0001
      statement: An interpolation referencing an undeclared input exits with code 1.
    - id: AC-0002
      statement: An interpolation referencing an undeclared input prints an Error-prefixed stderr message.

- id: TEMPLATE-FR-0010
  title: Input defaults must match input definitions
  status: active
  description: >
    Template-author defaults are schema metadata. A default is valid only on
    `required: false` inputs and must match the input's domain type and enum
    value set.
  acceptance:
    - id: AC-0001
      statement: A default on a required input exits with code 1.
    - id: AC-0002
      statement: A malformed default value exits with code 1 and prints an Error-prefixed stderr message.
