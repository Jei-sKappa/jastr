id: generate-inline-missing-target
covers:
  - GEN-FR-0028.AC-0005
title: Inline requires targets.agent-skill metadata
description: >
  Shows how a template lacking targets.agent-skill fails with
  missing_target_metadata in inline mode, just as in router mode.
command: ["generate", "agent-skill", "demo", "--out", "out/SKILL.md", "--mode=inline"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: Template must declare targets.agent-skill metadata for generate agent-skill.\n"
