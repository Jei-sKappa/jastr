id: include-escape-rejected
covers:
  - INCLUDE-FR-0003.AC-0001
title: Reject escaping includes
description: Shows how include paths that escape the standalone named template boundary are rejected.
command: ["run", "demo"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: Include path `../../outside.md` escapes the allowed include boundary.\n"
