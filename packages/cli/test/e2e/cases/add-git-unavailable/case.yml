id: add-git-unavailable
covers:
  - ADD-FR-0007.AC-0001
title: Add reports git_unavailable when git cannot be run
description: >
  With JASTR_GIT_BIN pointing at a nonexistent binary, a remote add fails with
  git_unavailable rather than hanging; nothing is installed.
command: ["add", "owner/repo", "foo"]
env:
  JASTR_GIT_BIN: "/nonexistent/jastr-no-such-git"
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: git is not available; install git to add a remote source (`owner/repo`).\n"
