id: run-basic
title: Run a basic skill
description: Render a minimal template with no inputs.
cwd: project
command: ["run", "demo"]
expect:
  exitCode: 0
  stdoutFile: expected/stdout.md
  stderr: ""
render:
  show:
    - kind: file
      path: project/.skillrouter/demo/SKILL.template.md
      label: Template
      language: md
    - kind: command
      label: Command
      language: bash
    - kind: stdout
      label: Rendered output
      language: md
