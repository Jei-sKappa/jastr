id: missing-optional-condition
title: Optional input in conditions
description: Shows how missing optional inputs are falsey in branch conditions.
cwd: project
command: ["run", "demo"]
expect:
  exitCode: 0
  stdout: "No target file.\n"
  stderr: ""
render:
  show:
    - kind: file
      path: project/.skillrouter/demo/SKILL.template.md
      label: Template
      language: md
    - kind: command
      label: Command
      language: bash
    - kind: stdout
      label: Rendered output
      language: txt