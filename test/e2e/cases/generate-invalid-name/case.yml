id: generate-invalid-name
covers:
  - GEN-FR-0006.AC-0001
  - GEN-FR-0006.AC-0002
title: Generate rejects name mismatch
description: Shows how generate validates that the template name matches the skill slug.
cwd: project
command: ["generate", "demo", "--out=out/SKILL.md"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: Generated skill name wrong-name must match skill demo.\n"
