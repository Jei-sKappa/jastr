id: unknown-command
covers:
  - RUN-FR-0002.AC-0001
  - RUN-FR-0002.AC-0002
title: Reject unknown commands
description: Shows how unknown commands are rejected before any project lookup.
command: ["invalid-command"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: Expected command shape: jastr run <template-ref> [input flags...], jastr generate agent-skill <template-ref> --out <path> [--check] [--force], or jastr validate <template-ref>.\n"
