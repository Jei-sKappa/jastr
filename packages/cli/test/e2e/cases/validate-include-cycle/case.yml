id: validate-include-cycle
covers:
  - VALIDATE-FR-0003.AC-0003
title: Reject an include cycle during validate
description: Shows how validate surfaces the same include_cycle error as run and generate.
command: ["validate", "demo"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: Include cycle detected: `.jastr/demo/a.md` -> `.jastr/demo/b.md` -> `.jastr/demo/a.md`.\n"
