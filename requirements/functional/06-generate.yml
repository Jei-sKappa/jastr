- id: GEN-FR-0001
  title: Generate writes a router skill
  status: active
  description: >
    The generate command writes a minimal router skill to an explicit output
    path.
  acceptance:
    - id: AC-0001
      statement: Generate exits with code 0 for a valid template and output path.
    - id: AC-0002
      statement: Generate writes the expected router skill file.
    - id: AC-0003
      statement: Generate prints the generated path and source template path.
    - id: AC-0004
      statement: Generate creates missing parent directories for the output path.

- id: GEN-FR-0002
  title: Generate requires an output path
  status: active
  description: >
    The generate command requires callers to provide `--out`.
  acceptance:
    - id: AC-0001
      statement: Missing `--out` exits with code 1.
    - id: AC-0002
      statement: Missing `--out` prints an Error-prefixed stderr message.

- id: GEN-FR-0003
  title: Generate refuses overwrite without force
  status: active
  description: >
    The generate command does not overwrite an existing destination unless
    `--force` is supplied.
  acceptance:
    - id: AC-0001
      statement: Existing output without `--force` exits with code 1.
    - id: AC-0002
      statement: Existing output without `--force` leaves the existing file unchanged.

- id: GEN-FR-0004
  title: Generate force overwrites existing output
  status: active
  description: >
    The generate command overwrites an existing destination when `--force` is
    supplied.
  acceptance:
    - id: AC-0001
      statement: Existing output with `--force` exits with code 0.
    - id: AC-0002
      statement: Existing output with `--force` writes the generated router skill.

- id: GEN-FR-0005
  title: Generate validates the template before writing
  status: active
  description: >
    The generate command validates the template schema, directives, and includes
    before generating the router skill output.
  acceptance:
    - id: AC-0001
      statement: An invalid template exits with code 1.
    - id: AC-0002
      statement: An invalid template prints an Error-prefixed stderr message.

- id: GEN-FR-0006
  title: Generate rejects a router name that does not match the skill slug
  status: active
  description: >
    The generate command validates that the template frontmatter name matches
    the skill slug before writing the output.
  acceptance:
    - id: AC-0001
      statement: A name mismatch exits with code 1.
    - id: AC-0002
      statement: A name mismatch prints an Error-prefixed stderr message.

- id: GEN-FR-0007
  title: Generate passes through author frontmatter and omits owned fields
  status: active
  description: >
    Generated router frontmatter preserves author-declared Agent Skills fields
    and additional kebab-case extension fields, and omits Skillrouter-owned
    fields such as `inputs`.
  acceptance:
    - id: AC-0001
      statement: Generate writes the expected router skill file for a template with extra frontmatter.
    - id: AC-0002
      statement: The generated router omits Skillrouter-owned fields such as inputs.
    - id: AC-0003
      statement: The generated router preserves known and extension frontmatter fields.

- id: GEN-FR-0008
  title: Generate rejects unsupported router frontmatter fields
  status: active
  description: >
    Generated router frontmatter rejects an extension field that is not a
    kebab-case top-level name.
  acceptance:
    - id: AC-0001
      statement: A non-kebab-case frontmatter field exits with code 1.
    - id: AC-0002
      statement: A non-kebab-case frontmatter field prints an Error-prefixed stderr message.

- id: GEN-FR-0009
  title: Generate rejects an over-long router description
  status: active
  description: >
    Generated router frontmatter rejects a description longer than 1024
    characters.
  acceptance:
    - id: AC-0001
      statement: An over-long description exits with code 1.
    - id: AC-0002
      statement: An over-long description prints an Error-prefixed stderr message.
