id: branch-adjacency
covers:
  - TEMPLATE-FR-0006.AC-0001
  - TEMPLATE-FR-0006.AC-0002
title: Reject branch directives after interrupting content
description: Shows how non-blank content between branches ends the group and makes a later else-if an error.
command: ["run", "demo"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: else-if directive must immediately follow an if or else-if branch.\n"
