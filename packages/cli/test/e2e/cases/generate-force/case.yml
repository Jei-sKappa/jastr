id: generate-force
covers:
  - GEN-FR-0004.AC-0001
  - GEN-FR-0004.AC-0002
title: Generate with --force
description: Shows how --force overwrites an existing output file.
command: ["generate", "agent-skill", "demo", "--out=out/SKILL.md", "--force"]
expect:
  exitCode: 0
  stdout: "Generated `out/SKILL.md` from template `.jastr/demo/template.md`"
  stderr: ""
  files:
    out/SKILL.md: expected/files/out/SKILL.md
