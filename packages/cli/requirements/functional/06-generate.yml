- id: GEN-FR-0001
  title: Generate agent-skill writes a wrapper skill
  status: active
  description: >
    The `generate agent-skill` command writes a minimal Agent Skill wrapper to
    an explicit output path from a template's `targets.agent-skill` metadata.
  acceptance:
    - id: AC-0001
      statement: Generate exits with code 0 for a valid template and output path.
    - id: AC-0002
      statement: Generate writes the expected Agent Skill wrapper file.
    - id: AC-0003
      statement: Generate prints the generated path and source template path.
    - id: AC-0004
      statement: Generate creates missing parent directories for the output path.

- id: GEN-FR-0002
  title: Generate requires an output path
  status: active
  description: >
    The `generate agent-skill` command requires callers to provide `--out`.
  acceptance:
    - id: AC-0001
      statement: Missing `--out` exits with code 1.
    - id: AC-0002
      statement: Missing `--out` prints an Error-prefixed stderr message.

- id: GEN-FR-0003
  title: Generate refuses overwrite without force
  status: active
  description: >
    The `generate agent-skill` command does not overwrite an existing
    destination unless `--force` is supplied.
  acceptance:
    - id: AC-0001
      statement: Existing output without `--force` exits with code 1.
    - id: AC-0002
      statement: Existing output without `--force` leaves the existing file unchanged.

- id: GEN-FR-0004
  title: Generate force overwrites existing output
  status: active
  description: >
    The `generate agent-skill` command overwrites an existing destination when
    `--force` is supplied.
  acceptance:
    - id: AC-0001
      statement: Existing output with `--force` exits with code 0.
    - id: AC-0002
      statement: Existing output with `--force` writes the generated Agent Skill wrapper.

- id: GEN-FR-0005
  title: Generate validates the template before writing
  status: active
  description: >
    The `generate agent-skill` command validates the template schema, directives,
    and includes before generating the Agent Skill wrapper output.
  acceptance:
    - id: AC-0001
      statement: An invalid template exits with code 1.
    - id: AC-0002
      statement: An invalid template prints an Error-prefixed stderr message.

- id: GEN-FR-0006
  title: Generate rejects an invalid Agent Skill name
  status: active
  description: >
    The `generate agent-skill` command validates that `targets.agent-skill.frontmatter.name`
    is a valid Agent Skill name (1-64 lowercase letters, numbers, and hyphens with no
    leading, trailing, or consecutive hyphens) before writing the output.
  acceptance:
    - id: AC-0001
      statement: An invalid Agent Skill name exits with code 1.
    - id: AC-0002
      statement: An invalid Agent Skill name prints an Error-prefixed stderr message.

- id: GEN-FR-0007
  title: Generate passes through target frontmatter and omits owned fields
  status: active
  description: >
    The generated Agent Skill wrapper frontmatter renders the required
    `targets.agent-skill.frontmatter.name` and `targets.agent-skill.frontmatter.description`,
    preserves any additional kebab-case `targets.agent-skill.frontmatter` fields, and
    omits Jastr-owned fields such as `inputs`.
  acceptance:
    - id: AC-0001
      statement: Generate writes the expected wrapper file for a template with extra frontmatter.
    - id: AC-0002
      statement: The generated wrapper omits Jastr-owned fields such as inputs.
    - id: AC-0003
      statement: The generated wrapper preserves the name, description, and extension frontmatter fields.

- id: GEN-FR-0008
  title: Generate rejects non-kebab target frontmatter fields
  status: active
  description: >
    The generated Agent Skill wrapper rejects a `targets.agent-skill.frontmatter`
    field that is not a kebab-case top-level name.
  acceptance:
    - id: AC-0001
      statement: A non-kebab-case frontmatter field exits with code 1.
    - id: AC-0002
      statement: A non-kebab-case frontmatter field prints an Error-prefixed stderr message.

- id: GEN-FR-0009
  title: Generate rejects an over-long target description
  status: active
  description: >
    The generated Agent Skill wrapper rejects a `targets.agent-skill.frontmatter.description`
    longer than 1024 characters.
  acceptance:
    - id: AC-0001
      statement: An over-long description exits with code 1.
    - id: AC-0002
      statement: An over-long description prints an Error-prefixed stderr message.

- id: GEN-FR-0010
  title: Generate rejects unsupported targets
  status: active
  description: >
    `agent-skill` is the only implemented generate target; other targets remain
    unavailable until their own specs are implemented.
  acceptance:
    - id: AC-0001
      statement: An unsupported generate target exits with code 1.
    - id: AC-0002
      statement: An unsupported generate target prints the stable Error-prefixed message.

- id: GEN-FR-0011
  title: Generate renders an Inputs section only for multi-input wrappers
  status: active
  description: >
    The generated Agent Skill wrapper never contains `$ARGUMENTS`. A wrapper
    carries a `## Inputs` section plus the construct-flags instruction only when
    two or more inputs are rendered; a no-input wrapper and a single-input
    wrapper both omit the section.
  acceptance:
    - id: AC-0001
      statement: "A template that declares no inputs generates a wrapper with no Inputs section and a bare jastr run command."
    - id: AC-0002
      statement: "A template that declares two or more inputs generates a wrapper with an Inputs section."

- id: GEN-FR-0012
  title: Generate agent-skill supports selected variants
  status: active
  description: >
    `jastr generate agent-skill <template-ref>#<variant-id>` resolves and
    validates the selected variant, merges variant Agent Skill frontmatter over
    optional base target frontmatter, uses selected locked inputs during static
    render validation, and emits a wrapper command that points at the variant
    ref.
  acceptance:
    - id: AC-0001
      statement: Variant generation writes a wrapper whose command uses `<template-ref>#<variant-id>`.
    - id: AC-0002
      statement: Variant frontmatter shallowly overrides base Agent Skill frontmatter.
    - id: AC-0003
      statement: Variant generation can succeed without base `targets.agent-skill` when variant frontmatter supplies required metadata.
    - id: AC-0004
      statement: "A variant wrapper renders an Inputs section listing the unlocked inputs when two or more declared inputs are not locked."
    - id: AC-0005
      statement: "A variant wrapper omits the Inputs section when all declared inputs are locked."
    - id: AC-0006
      statement: Static render validation uses selected locked input values.

- id: GEN-FR-0013
  title: Generate --check confirms an up-to-date agent-skill
  status: active
  description: >
    `generate agent-skill --check` rebuilds the wrapper in memory and
    byte-compares it against the committed file at `--out`, writing nothing.
    When the committed bytes match, the command exits 0 with a confirmation
    line.
  acceptance:
    - id: AC-0001
      statement: A --check run against a byte-identical committed file exits with code 0.
    - id: AC-0002
      statement: A --check run against a byte-identical committed file prints `agent-skill at <out> is up to date.` to stdout.
    - id: AC-0003
      status: removed
      statement: A --check run leaves the committed file unchanged.
      removedReason: >
        On the up-to-date path the committed file is byte-identical to freshly
        built content, so "leaves the file unchanged" is indistinguishable from
        a wrongful identical-byte rewrite and cannot be falsified by content
        comparison. The no-write guarantee is one code path, verified with teeth
        on the stale path by GEN-FR-0014.AC-0003, where committed bytes differ
        from fresh content.

- id: GEN-FR-0014
  title: Generate --check reports a stale agent-skill
  status: active
  description: >
    `generate agent-skill --check` reports a committed file whose bytes differ
    from freshly built content as stale, exiting 1 with the `output_stale`
    message and writing nothing. Comparison is exact bytes, so a difference only
    in trailing newline or line endings is still stale.
  acceptance:
    - id: AC-0001
      statement: A --check run against a committed file whose bytes differ exits with code 1.
    - id: AC-0002
      statement: A --check run against a stale committed file prints the output_stale Error message to stderr.
    - id: AC-0003
      statement: A --check run leaves the stale committed file unchanged.

- id: GEN-FR-0015
  title: Generate --check reports a missing agent-skill
  status: active
  description: >
    `generate agent-skill --check` reports the absence of a file at `--out` as a
    check failure, exiting 1 with the `output_missing` message and writing
    nothing.
  acceptance:
    - id: AC-0001
      statement: A --check run with no file at `--out` exits with code 1.
    - id: AC-0002
      statement: A --check run with no file at `--out` prints the output_missing Error message to stderr.

- id: GEN-FR-0016
  title: Generate --check rejects --force
  status: active
  description: >
    `--check` never writes and `--force` governs overwriting, so combining them
    is incoherent. The argv pre-validator rejects the combination with the
    `invalid_command` code.
  acceptance:
    - id: AC-0001
      statement: --check combined with --force exits with code 1.
    - id: AC-0002
      statement: "--check combined with --force prints `Error: --check cannot be combined with --force.` to stderr."

- id: GEN-FR-0017
  title: Generate --check surfaces template defects before freshness
  status: active
  description: >
    `--check` performs full template validation and the static render before it
    compares, so an invalid template fails with its own existing error and code,
    not a stale or missing error.
  acceptance:
    - id: AC-0001
      statement: A --check run against a template that lacks targets.agent-skill exits 1 with the existing missing-target metadata Error message, not a stale or missing error.

- id: GEN-FR-0018
  title: Generate --check compares variant-specific content
  status: active
  description: >
    `generate agent-skill <ref>#<variant> --check` resolves the selected variant
    and compares against the variant-specific built content (merged frontmatter
    and the variant-aware wrapper command).
  acceptance:
    - id: AC-0001
      statement: A --check run on a variant ref against byte-identical variant content exits with code 0.
    - id: AC-0002
      statement: A --check run on a variant ref against byte-identical variant content prints the up-to-date confirmation line.

- id: GEN-FR-0019
  title: Generate renders the Inputs section bullets
  status: active
  description: >
    For an input-bearing template the wrapper body lists each rendered input as
    one `## Inputs` bullet in template declaration order. Each bullet shows the
    backticked `--flag`, the type token (with enum values joined by `|`), the
    required/optional status, an optional `default:` segment for optional inputs
    with a declared default, and an optional em-dash description. No generated
    wrapper contains the literal token `$ARGUMENTS`.
  acceptance:
    - id: AC-0001
      statement: "The Inputs section lists one bullet per rendered input in template declaration order."
    - id: AC-0002
      statement: "Each bullet renders its type token (enum values joined by a pipe), required/optional status, and optional default segment."
    - id: AC-0003
      statement: "An input declaring a description renders it verbatim after an em dash; an input without one renders no description segment."
    - id: AC-0004
      statement: "No generated wrapper contains the literal token $ARGUMENTS."

- id: GEN-FR-0020
  title: Generate inlines required inputs into the command
  status: active
  description: >
    The generated wrapper command carries every rendered required input as a
    `--<name>=<value>` placeholder in template declaration order. Optional
    inputs are never inlined, and the uniform literal `<value>` placeholder is
    used for every type, including boolean.
  acceptance:
    - id: AC-0001
      statement: "A required input is inlined into the command as `--<name>=<value>`."
    - id: AC-0002
      statement: "Multiple required inputs are inlined in template declaration order."
    - id: AC-0003
      statement: "Optional inputs are not inlined into the command."
    - id: AC-0004
      statement: "A boolean required input is inlined as `--<name>=<value>`, never the bare `--<name>` form."

- id: GEN-FR-0021
  title: Generate renders single-input wrappers without an Inputs section
  status: active
  description: >
    A wrapper whose rendered input list has exactly one entry omits the
    `## Inputs` section and folds that input into a tailored instruction
    sentence. A single required input inlines `--<name>=<value>` in the command;
    a single optional input keeps the command bare.
  acceptance:
    - id: AC-0001
      statement: "A template with exactly one required input omits the Inputs section, renders the single-required sentence, and inlines `--<name>=<value>` in the command."
    - id: AC-0002
      statement: "A template with exactly one optional input omits the Inputs section, renders the single-optional sentence, and keeps the command bare."

- id: GEN-FR-0022
  title: Generate keeps the command bare when no required input is rendered
  status: active
  description: >
    A multi-input wrapper whose rendered inputs are all optional renders the
    `## Inputs` section with a bare `jastr run <template-ref>` command, since
    optionals are never inlined.
  acceptance:
    - id: AC-0001
      statement: "A template with two or more inputs that are all optional renders an Inputs section and a bare jastr run command."

- id: GEN-FR-0023
  title: Generate emits an argument-hint frontmatter field
  status: active
  description: >
    The generated Agent Skill wrapper emits an `argument-hint` frontmatter field
    that combines the author-supplied `targets.agent-skill.argument-hint-prefix`
    intent with an auto-derived flag form listing the rendered inputs. The
    derived form follows a fixed grammar per input type and required/optional
    status, joined by single spaces in declaration order. The field is inserted
    immediately after `description` and before passthrough frontmatter, is
    omitted entirely when neither a prefix nor any input exists, and is
    serialized through the deterministic YAML path so special characters
    round-trip and `--check` byte-comparison stays stable. A literal
    `argument-hint` in base `targets.agent-skill.frontmatter` and an invalid base
    `argument-hint-prefix` are rejected with `invalid_target_metadata`.
  acceptance:
    - id: AC-0001
      statement: "The derived form renders each grammar row (string/enum/boolean x required/optional) and joins all inputs by single spaces in declaration order."
    - id: AC-0002
      statement: "A valid base argument-hint-prefix is prepended to the derived form with exactly one space, and the template generates with exit code 0."
    - id: AC-0003
      statement: "A template with inputs and no prefix emits argument-hint with the derived form only."
    - id: AC-0004
      statement: "A template with no inputs and no prefix emits no argument-hint field."
    - id: AC-0005
      statement: "A template with no inputs and a prefix emits argument-hint with the prefix only."
    - id: AC-0006
      statement: "The emitted argument-hint appears immediately after description and before any passthrough frontmatter field."
    - id: AC-0007
      statement: "A non-string, empty/whitespace-only, or multi-line base argument-hint-prefix exits 1 with an invalid_target_metadata Error message."
    - id: AC-0008
      statement: "A literal argument-hint in base targets.agent-skill.frontmatter exits 1 with an invalid_target_metadata Error message."
    - id: AC-0009
      statement: "A --check run against a committed wrapper that carries the derived argument-hint line exits 0 with the up-to-date message."
    - id: AC-0010
      statement: "A --check run against a committed wrapper missing the now-derived argument-hint line exits 1 with the output_stale message."
    - id: AC-0011
      statement: "An argument-hint value containing [, <, |, =, and a leading - is emitted as valid YAML and re-checks clean end-to-end."

- id: GEN-FR-0024
  title: Generate agent-skill accepts and validates a --mode option
  status: active
  description: >
    `generate agent-skill` accepts `--mode <value>` whose only valid values are
    `router` and `inline`. Omitting `--mode` defaults to `router`, preserving
    today's wrapper behavior. Any other value, or a value-less `--mode`, is an
    `invalid_command` argv-shape error surfaced before Commander parses.
  acceptance:
    - id: AC-0001
      statement: A generate invocation with no `--mode` produces the router wrapper and exits 0.
    - id: AC-0002
      statement: "Both `--mode=router` and `--mode=inline` are accepted on an otherwise valid invocation (exit 0)."
    - id: AC-0003
      statement: "`--mode=<unknown>` exits 1 with an invalid_command Error message naming router and inline."
    - id: AC-0004
      statement: "A value-less `--mode` exits 1 with an invalid_command Error message."

- id: GEN-FR-0025
  title: Inline mode writes the fully-rendered template body
  status: active
  description: >
    `--mode=inline` performs a single real render of the template with fully
    resolved inputs and writes `---\n<yaml>\n---\n\n<body>`: the frontmatter
    header, exactly one blank line, then the render output verbatim. Includes are
    inlined, conditionals collapse to the selected branch, and interpolations are
    substituted. None of the router body scaffolding (Inputs section,
    construct-flags sentence, `jastr run` command block, failure-line
    instruction) appears. A successful write prints the shared `Generated <path>
    from template <source>` success message.
  acceptance:
    - id: AC-0001
      statement: Inline output for a template with an include partial contains the included content inlined rather than an include directive.
    - id: AC-0002
      statement: Inline output for a template with an if/else branch on a resolved input contains only the selected branch's text.
    - id: AC-0003
      statement: "The inline file is exactly `---\\n<yaml>\\n---\\n\\n<body>` with a single blank line before the verbatim rendered body."
    - id: AC-0004
      statement: "Inline output contains none of the router scaffolding: no Inputs section, construct-flags sentence, jastr run command block, or failure-line instruction."
    - id: AC-0005
      statement: A successful inline write prints the same `Generated <path> from template <source>` success message the router path prints (exit 0).

- id: GEN-FR-0026
  title: Inline mode resolves inputs through run's pipeline
  status: active
  description: >
    Inline resolves inputs with the same precedence `run` uses: CLI flags > local
    config > global config > template-author defaults, plus variant locked-inputs
    from a `<ref>#<variant>` ref. A CLI flag colliding with a locked input is
    rejected with `locked_input_flag`. For a named ref, composed `config.yml`
    inputs and variants participate; for a direct `.md` ref, neither config nor
    variants apply.
  acceptance:
    - id: AC-0001
      statement: An input set via `config.yml inputs.<ref>` is reflected in inline output with no CLI flag passed.
    - id: AC-0002
      statement: A CLI flag overrides a `config.yml` value for the same input in inline output.
    - id: AC-0003
      statement: "`generate agent-skill <ref>#<variant> --mode=inline` bakes the variant's locked-input values into the rendered body."
    - id: AC-0004
      statement: "A CLI flag naming a locked input on a `<ref>#<variant>` ref exits 1 with a locked_input_flag Error message."
    - id: AC-0005
      statement: For a direct `.md` ref, `config.yml` and variants are ignored and resolution uses CLI flags and author defaults only.

- id: GEN-FR-0027
  title: Inline mode fails hard on an unresolved required input
  status: active
  description: >
    If, after resolution, a required input has no value and no default, inline
    generation fails with the engine's existing `missing_required_input` error
    and writes no file. No `<value>` placeholder is emitted.
  acceptance:
    - id: AC-0001
      statement: "Inline generation of a template with an unresolved required input exits 1 with `Required input <name> is missing.` and writes no file."

- id: GEN-FR-0028
  title: Inline mode emits frontmatter with a verbatim argument-hint prefix
  status: active
  description: >
    Inline emits the same `targets.agent-skill` frontmatter the router carries —
    `name`, `description`, and validated passthrough fields — with variant
    `agent-skill.frontmatter` overlaid when a variant is selected.
    `targets.agent-skill` is required; its absence fails with
    `missing_target_metadata`. Because every input is resolved at generate time,
    the derived `argument-hint` form is empty: `argument-hint` is the author
    `argument-hint-prefix` verbatim (no `--flag` form) when a prefix exists, the
    variant prefix wholesale when a selected variant declares one, and is omitted
    entirely when no prefix exists.
  acceptance:
    - id: AC-0001
      statement: Inline frontmatter contains `name` and `description` from `targets.agent-skill.frontmatter` plus all validated passthrough fields.
    - id: AC-0002
      statement: "With a `targets.agent-skill.argument-hint-prefix` declared, inline `argument-hint` equals that prefix verbatim with no `--flag` form appended."
    - id: AC-0003
      statement: With no prefix declared, inline frontmatter omits `argument-hint` entirely.
    - id: AC-0004
      statement: With a selected variant declaring `agent-skill.argument-hint-prefix`, the variant prefix replaces the base prefix wholesale in inline `argument-hint`.
    - id: AC-0005
      statement: "A template lacking `targets.agent-skill` exits 1 with a missing_target_metadata Error message in inline mode."

- id: GEN-FR-0029
  title: Template input flags are gated to inline mode
  status: active
  description: >
    Template input flags (e.g. `--target=spec`) are accepted only in inline mode.
    In router mode (explicit or default) supplying any template input flag is an
    `invalid_command` argv-shape error.
  acceptance:
    - id: AC-0001
      statement: "`--mode=router` (or the default) with any template input flag exits 1 with an invalid_command Error message."
    - id: AC-0002
      statement: "`--mode=inline` with a declared input flag is accepted and resolves that input into the rendered body."

- id: GEN-FR-0030
  title: Inline --check parity with mode-aware suggested-fix messages
  status: active
  description: >
    `--mode=inline --check` rebuilds the inline content in memory and
    byte-compares it against `--out`, writing nothing: exit 0 with the up-to-date
    message on an exact match, `output_stale` when bytes differ, `output_missing`
    when no file exists. The `output_stale` and `output_missing` suggested-fix
    commands name `--mode=inline` (and `--force` for stale). `--check` combined
    with `--force` is rejected exactly as today.
  acceptance:
    - id: AC-0001
      statement: "`--mode=inline --check` against a byte-matching file exits 0 with the up-to-date message and writes nothing."
    - id: AC-0002
      statement: "`--mode=inline --check` against a differing file exits 1 with output_stale whose suggested-fix command names `--mode=inline` and `--force`, leaving the stale file unchanged."
    - id: AC-0003
      statement: "`--mode=inline --check` against a missing file exits 1 with output_missing whose suggested-fix command names `--mode=inline`."
    - id: AC-0004
      statement: "`--mode=inline --check --force` is rejected with `Error: --check cannot be combined with --force.` exactly as the existing combination is."

- id: GEN-FR-0031
  title: Validate stays mode-agnostic
  status: active
  description: >
    `jastr validate <ref>` takes no `--mode` flag; `--mode` is a `generate
    agent-skill` concern only. Supplying `--mode` to validate is an
    `invalid_command` argv-shape error reported as an unknown validate option.
  acceptance:
    - id: AC-0001
      statement: "`validate <ref> --mode=inline` exits 1 with an invalid_command unknown-validate-option Error message."
