id: generate-check-invalid-template
covers:
  - GEN-FR-0017.AC-0001
title: Check surfaces template defects before freshness
description: Shows how --check fails with the template's own validation error rather than a stale or missing error.
command: ["generate", "agent-skill", "demo", "--out", "out/SKILL.md", "--check"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: Template must declare targets.agent-skill metadata for generate agent-skill.\n"
