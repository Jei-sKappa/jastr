id: include-raw
title: Include raw content
description: Shows how include-raw copies file content without processing directives.
cwd: project
command: ["run", "demo"]
expect:
  exitCode: 0
  stdoutFile: expected/stdout.txt
  stderr: ""
render:
  show:
    - kind: file
      path: project/.skillrouter/demo/SKILL.template.md
      label: Template
      language: md
    - kind: command
      label: Command
      language: bash
    - kind: stdout
      label: Rendered output
      language: md