id: remove-unknown-hint
covers:
  - REMOVE-FR-0005.AC-0001
title: Remove of an unknown local id hints the other root
description: >
  foo is not installed in the local root but is tracked in the global root.
  remove (default local) fails with not_installed and hints the user to re-run
  with -g.
command: ["remove", "foo"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: foo is not installed in the local root; it is installed in the global root — re-run with -g to remove it.\n"
