id: generate-force
title: Generate with --force
description: Shows how --force overwrites an existing output file.
cwd: .
command: ["generate", "demo", "--out=out/SKILL.md", "--force"]
expect:
  exitCode: 0
  stdout: "Generated `{{projectRoot}}/out/SKILL.md` from template `{{projectRoot}}/.skillrouter/demo/SKILL.template.md`"
  stderr: ""
  fileNotContains:
    out/SKILL.md:
      - "existing"
render:
  show:
    - kind: command
      label: Command
      language: bash
    - kind: stdout
      label: Success message
      language: txt