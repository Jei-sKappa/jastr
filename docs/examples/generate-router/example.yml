id: generate-router
title: Generate a router skill
description: Shows how generate writes a minimal router skill from a template.
cwd: .
command: ["generate", "demo", "--out", "out/SKILL.md"]
expect:
  exitCode: 0
  stdout: "Generated `{{projectRoot}}/out/SKILL.md` from template `{{projectRoot}}/.skillrouter/demo/SKILL.template.md`"
  stderr: ""
  files:
    out/SKILL.md: expected/files/out/SKILL.md
render:
  show:
    - kind: file
      path: project/.skillrouter/demo/SKILL.template.md
      label: Template
      language: md
    - kind: command
      label: Command
      language: bash
    - kind: stdout
      label: Success message
      language: txt
    - kind: generated-file
      path: out/SKILL.md
      label: Generated router skill
      language: md