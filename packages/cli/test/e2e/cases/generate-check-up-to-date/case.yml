id: generate-check-up-to-date
covers:
  - GEN-FR-0013.AC-0001
  - GEN-FR-0013.AC-0002
title: Check an up-to-date agent-skill
description: Shows how --check confirms a committed wrapper that matches freshly built content, writing nothing.
command: ["generate", "agent-skill", "demo", "--out", "out/SKILL.md", "--check"]
expect:
  exitCode: 0
  stdout: "agent-skill at `out/SKILL.md` is up to date."
  stderr: ""
