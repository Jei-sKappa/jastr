- id: INCLUDE-FR-0001
  title: Include renders Markdown fragments
  status: active
  description: >
    The include directive inserts a referenced Markdown fragment into rendered
    output.
  acceptance:
    - id: AC-0001
      statement: The include directive renders the referenced fragment content.

- id: INCLUDE-FR-0002
  title: Include raw emits verbatim text
  status: active
  description: >
    The include-raw directive inserts referenced file content without processing
    it as a template.
  acceptance:
    - id: AC-0001
      statement: The include-raw directive preserves Jastr-looking syntax as text.

- id: INCLUDE-FR-0003
  title: Unsafe includes are rejected
  status: active
  description: >
    Include directives cannot read files outside the project root, `.env` files,
    absolute paths, or `~` home-relative paths.
  acceptance:
    - id: AC-0001
      statement: Include paths escaping the project root are rejected.
    - id: AC-0002
      statement: Include paths targeting `.env` files are rejected.
    - id: AC-0003
      statement: Absolute include paths are rejected.
    - id: AC-0004
      statement: Home-relative (~) include paths are rejected.

- id: INCLUDE-FR-0004
  title: Include cycles are detected and rejected
  status: active
  description: >
    Circular includes are detected during template loading and rejected with a
    clear error message.
  acceptance:
    - id: AC-0001
      statement: An include cycle exits with code 1.
    - id: AC-0002
      statement: An include cycle prints an Error-prefixed stderr message.

- id: INCLUDE-FR-0005
  title: Missing include files are rejected
  status: active
  description: >
    Include directives that reference a nonexistent file are rejected.
  acceptance:
    - id: AC-0001
      statement: A missing include file exits with code 1.
    - id: AC-0002
      statement: A missing include file prints an Error-prefixed stderr message.

- id: INCLUDE-FR-0006
  title: Include read errors are reported
  status: active
  description: >
    An include path that resolves inside the project root but cannot be read as
    a file (for example, it points to a directory) fails with a normalized
    filesystem cause rather than the raw platform error.
  acceptance:
    - id: AC-0001
      statement: An include path that points to a directory exits with code 1.
    - id: AC-0002
      statement: An include path that points to a directory prints an Error-prefixed stderr message naming the filesystem cause.

- id: INCLUDE-FR-0007
  title: Direct-file includes stay inside the template directory
  status: active
  description: >
    Direct-file template includes resolve relative to the including file and
    cannot escape the initial direct template file directory.
  acceptance:
    - id: AC-0001
      statement: A direct-file include escaping the template directory exits with code 1.
    - id: AC-0002
      statement: A direct-file include escaping the template directory prints the stable Error-prefixed message.
