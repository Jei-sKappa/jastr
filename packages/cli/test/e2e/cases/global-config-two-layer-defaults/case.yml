id: global-config-two-layer-defaults
covers:
  - GLOBAL-FR-0005.AC-0001
  - GLOBAL-FR-0005.AC-0003
title: Both root configs consulted; unset key falls to template default
description: >
  A bare named run consults both the global and local config.yml. A key present
  only in the global config takes its global value, a key present in both takes
  the local value, and a key in neither falls to the template-author default.
command: ["run", "demo"]
expect:
  exitCode: 0
  stdout: "depth=deep output=globalout region=us\n"
  stderr: ""
