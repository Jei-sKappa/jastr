- id: RUN-FR-0001
  title: Run renders a skill template
  status: active
  description: >
    The CLI renders `.skillrouter/<skill>/SKILL.template.md` when the user runs
    `skillrouter run <skill>` from inside a project.
  acceptance:
    - id: AC-0001
      statement: Exits with code 0 when the skill exists and inputs are valid.
    - id: AC-0002
      statement: Prints rendered Markdown to stdout.
    - id: AC-0003
      statement: Prints nothing to stderr.

- id: INPUT-FR-0001
  title: String inputs interpolate into rendered output
  status: active
  description: >
    A declared string input supplied through a CLI flag is available to template
    interpolation.
  acceptance:
    - id: AC-0001
      statement: A supplied string input replaces the matching interpolation placeholder.

- id: INPUT-FR-0002
  title: Missing optional inputs interpolate as empty strings
  status: active
  description: >
    An optional input that is not supplied does not fail rendering and expands to
    an empty string when interpolated.
  acceptance:
    - id: AC-0001
      statement: Missing optional input interpolation produces an empty string.

- id: INPUT-FR-0003
  title: Missing required inputs are rejected
  status: active
  description: >
    A template-declared required input must be supplied by the caller.
  acceptance:
    - id: AC-0001
      statement: Missing required input exits with code 1.
    - id: AC-0002
      statement: Missing required input prints an Error-prefixed stderr message.
    - id: AC-0003
      statement: Missing required input prints nothing to stdout.

- id: INPUT-FR-0004
  title: Invalid enum values are rejected
  status: active
  description: >
    Enum inputs accept only values declared in the template frontmatter.
  acceptance:
    - id: AC-0001
      statement: A value outside the enum's allowed set exits with code 1.
    - id: AC-0002
      statement: A value outside the enum's allowed set prints an Error-prefixed stderr message.

- id: FLAGS-FR-0001
  title: Boolean inputs accept supported flag forms
  status: active
  description: >
    Boolean inputs can be supplied as a bare flag, as `=true`, or as `=false`.
  acceptance:
    - id: AC-0001
      statement: A bare boolean flag sets the input to true.
    - id: AC-0002
      statement: A boolean flag with `=true` sets the input to true.
    - id: AC-0003
      statement: A boolean flag with `=false` sets the input to false.

- id: FLAGS-FR-0002
  title: Unknown flags are rejected
  status: active
  description: >
    The CLI rejects flags that are not declared by the selected template.
  acceptance:
    - id: AC-0001
      statement: An unknown input flag exits with code 1.
    - id: AC-0002
      statement: An unknown input flag prints an Error-prefixed stderr message.

- id: FLAGS-FR-0003
  title: Duplicate flags are rejected
  status: active
  description: >
    The CLI rejects multiple values for the same input flag.
  acceptance:
    - id: AC-0001
      statement: A duplicate input flag exits with code 1.
    - id: AC-0002
      statement: A duplicate input flag prints an Error-prefixed stderr message.

- id: COND-FR-0001
  title: Enum inputs select conditional branches
  status: active
  description: >
    Template conditionals can branch on enum input values.
  acceptance:
    - id: AC-0001
      statement: An enum input selects the matching if or else-if branch.

- id: COND-FR-0002
  title: Missing optional inputs are false in conditions
  status: active
  description: >
    An optional input that is not supplied evaluates false in conditional
    expressions.
  acceptance:
    - id: AC-0001
      statement: A missing optional input takes the false branch.

- id: INCLUDE-FR-0001
  title: Include renders Markdown fragments
  status: active
  description: >
    The include directive inserts a referenced Markdown fragment into rendered
    output.
  acceptance:
    - id: AC-0001
      statement: The include directive renders the referenced fragment content.

- id: INCLUDE-FR-0002
  title: Include raw emits verbatim text
  status: active
  description: >
    The include-raw directive inserts referenced file content without processing
    it as a template.
  acceptance:
    - id: AC-0001
      statement: The include-raw directive preserves Skillrouter-looking syntax as text.

- id: INCLUDE-FR-0003
  title: Unsafe includes are rejected
  status: active
  description: >
    Include directives cannot read files outside the project root or `.env`
    files.
  acceptance:
    - id: AC-0001
      statement: Include paths escaping the project root are rejected.
    - id: AC-0002
      statement: Include paths targeting `.env` files are rejected.

- id: GEN-FR-0001
  title: Generate writes a router skill
  status: active
  description: >
    The generate command writes a minimal router skill to an explicit output
    path.
  acceptance:
    - id: AC-0001
      statement: Generate exits with code 0 for a valid template and output path.
    - id: AC-0002
      statement: Generate writes the expected router skill file.
    - id: AC-0003
      statement: Generate prints the generated path and source template path.

- id: GEN-FR-0002
  title: Generate requires an output path
  status: active
  description: >
    The generate command requires callers to provide `--out`.
  acceptance:
    - id: AC-0001
      statement: Missing `--out` exits with code 1.
    - id: AC-0002
      statement: Missing `--out` prints an Error-prefixed stderr message.

- id: GEN-FR-0003
  title: Generate refuses overwrite without force
  status: active
  description: >
    The generate command does not overwrite an existing destination unless
    `--force` is supplied.
  acceptance:
    - id: AC-0001
      statement: Existing output without `--force` exits with code 1.
    - id: AC-0002
      statement: Existing output without `--force` leaves the existing file unchanged.

- id: GEN-FR-0004
  title: Generate force overwrites existing output
  status: active
  description: >
    The generate command overwrites an existing destination when `--force` is
    supplied.
  acceptance:
    - id: AC-0001
      statement: Existing output with `--force` exits with code 0.
    - id: AC-0002
      statement: Existing output with `--force` writes the generated router skill.

- id: HELP-FR-0001
  title: CLI prints help for the program and commands
  status: active
  description: >
    Skillrouter exposes help text for the root program and supported commands.
  acceptance:
    - id: AC-0001
      statement: Root help exits with code 0 and prints usage text.
    - id: AC-0002
      statement: Run help exits with code 0 and prints usage text.

- id: VERSION-FR-0001
  title: Version prints package version and build SHA marker
  status: active
  description: >
    The version command prints the current package version and either a build
    SHA or the source-run `dev` marker.
  acceptance:
    - id: AC-0001
      statement: Source-run version output is exactly the package version followed by ` (dev)`.
