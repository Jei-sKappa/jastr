id: direct-file-include-escape
covers:
  - INCLUDE-FR-0007.AC-0001
  - INCLUDE-FR-0007.AC-0002
title: Reject a direct-file include escaping the template directory
description: Direct-file includes are contained to the top-level direct template file directory.
command: ["run", "templates/direct.md"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: Include path ../outside.md escapes the allowed include boundary.\n"
