id: generate-argument-hint-omitted
covers:
  - GEN-FR-0023.AC-0004
title: Generate omits argument-hint with no prefix and no inputs
description: >
  A no-input template that declares no argument-hint-prefix emits no
  argument-hint frontmatter field at all.
command: ["generate", "agent-skill", "demo", "--out=out/SKILL.md"]
expect:
  exitCode: 0
  stdout: "Generated `out/SKILL.md` from template `.jastr/demo/TEMPLATE.md`"
  stderr: ""
  files:
    out/SKILL.md: expected/files/out/SKILL.md
  fileNotContains:
    out/SKILL.md:
      - "argument-hint"
