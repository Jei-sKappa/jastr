id: generate-argument-hint-variant-fully-locked
covers:
  - VAR-FR-0011.AC-0004
title: Fully-locked variant with a prefix emits the prefix alone
description: >
  A variant that locks every declared input but declares an
  argument-hint-prefix emits argument-hint with the variant prefix and no
  derived flag form.
command: ["generate", "agent-skill", "review#deep", "--out=out/SKILL.md"]
expect:
  exitCode: 0
  stdout: "Generated `out/SKILL.md` from template `.jastr/review/TEMPLATE.md`"
  stderr: ""
  files:
    out/SKILL.md: expected/files/out/SKILL.md
