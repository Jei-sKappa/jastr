id: global-missing-both-roots
covers:
  - GLOBAL-FR-0003.AC-0002
title: missing_project_root only when neither root exists
description: >
  With neither a local .jastr nor a global root present, the command exits 1
  with the missing_project_root message naming both searched locations.
command: ["run", "demo"]
substitute:
  __GLOBAL_ROOT__: globalRoot
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: No .jastr directory found locally (searched from the current directory up) or globally (__GLOBAL_ROOT__/.jastr).\n"
