id: validate-bad-agent-skill-target
covers:
  - VALIDATE-FR-0004.AC-0001
title: Reject malformed agent-skill target metadata during validate
description: Shows how validate checks declared targets.agent-skill metadata with the same rules as generate.
command: ["validate", "demo"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: targets.agent-skill.frontmatter.name must be 1-64 lowercase letters, numbers, and hyphens with no leading, trailing, or consecutive hyphens.\n"
