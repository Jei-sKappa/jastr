id: variant-invalid-config-locked-inputs
covers:
  - VAR-FR-0007.AC-0004
title: Reject a non-mapping locked-inputs
description: A non-mapping selected locked-inputs fails with a stable error.
command: ["run", "review#deep"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: .jastr/config.yml `variants.review.deep.locked-inputs` must be a mapping.\n"
