id: missing-optional-interpolation
title: Optional input in interpolation
description: Shows how interpolating a missing optional input fails at run time.
cwd: project
command: ["run", "demo"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: Input target-file is optional and was not provided for interpolation.\n"
render:
  show:
    - kind: file
      path: project/.skillrouter/demo/SKILL.template.md
      label: Template
      language: md
    - kind: command
      label: Command
      language: bash
    - kind: stderr
      label: Error
      language: txt
hidden: true
