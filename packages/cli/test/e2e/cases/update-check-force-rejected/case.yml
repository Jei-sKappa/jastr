id: update-check-force-rejected
covers:
  - UPDATE-FR-0006.AC-0003
title: update --check combined with --force is rejected
description: >
  --check writes nothing and --force governs overwriting, so the combination is
  incoherent. Mirroring generate, update rejects it with invalid_command before
  any project lookup.
command: ["update", "--check", "--force"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: --check cannot be combined with --force.\n"
