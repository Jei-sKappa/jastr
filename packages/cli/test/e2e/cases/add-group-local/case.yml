id: add-group-local
covers:
  - ADD-FR-0002.AC-0001
title: Add a whole group from a local path
description: >
  Installs an entire group — its .jastrgroup marker and every template — from a
  local source, reporting the group's template count in the success line.
command: ["add", "./source", "mygroup"]
expect:
  exitCode: 0
  stdout: "Installed group mygroup (2 templates) from ./source into .jastr/mygroup [local]."
  stderr: ""
  files:
    .jastr/mygroup/.jastrgroup: fixture/source/.jastr/mygroup/.jastrgroup
    .jastr/mygroup/templates/one/TEMPLATE.md: fixture/source/.jastr/mygroup/templates/one/TEMPLATE.md
    .jastr/mygroup/templates/two/TEMPLATE.md: fixture/source/.jastr/mygroup/templates/two/TEMPLATE.md
