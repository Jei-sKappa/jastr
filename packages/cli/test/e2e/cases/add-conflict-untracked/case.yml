id: add-conflict-untracked
covers:
  - ADD-FR-0010.AC-0002
title: Add over an untracked id tells the user to delete it by hand
description: >
  An id present on disk but with no lock entry is author-written. add writes
  nothing and fails with destination_exists telling the user it was not
  jastr-installed; the existing author file is left untouched.
command: ["add", "./source", "foo"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: `.jastr/foo` already exists and was not jastr-installed; delete it by hand before adding `foo`.\n"
  files:
    .jastr/foo/TEMPLATE.md: fixture/.jastr/foo/TEMPLATE.md
