id: generate-argument-hint-reserved-variant
covers:
  - VAR-FR-0011.AC-0006
title: Generate reserves argument-hint against variant passthrough
description: >
  A literal argument-hint declared in a selected variant's
  agent-skill.frontmatter is rejected with invalid_target_metadata, exit 1.
command: ["generate", "agent-skill", "review#deep", "--out=out/SKILL.md"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: targets.agent-skill.frontmatter must not declare argument-hint.\n"
