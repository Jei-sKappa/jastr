- id: RUN-FR-0001
  title: Run renders a skill template
  status: active
  description: >
    The CLI renders `.skillrouter/<skill>/SKILL.template.md` when the user runs
    `skillrouter run <skill>` from inside a project.
  acceptance:
    - id: AC-0001
      statement: Exits with code 0 when the skill exists and inputs are valid.
    - id: AC-0002
      statement: Prints rendered Markdown to stdout.
    - id: AC-0003
      statement: Prints nothing to stderr.

- id: RUN-FR-0002
  title: CLI rejects unknown commands
  status: active
  description: >
    The CLI rejects commands other than `run`, `generate`, `help`, `--help`,
    `--version`, and `-V`.
  acceptance:
    - id: AC-0001
      statement: An unknown command exits with code 1.
    - id: AC-0002
      statement: An unknown command prints an Error-prefixed stderr message.

- id: RUN-FR-0003
  title: CLI rejects invalid skill names
  status: active
  description: >
    Skill names must match the pattern of lowercase letters, digits, and
    hyphens.
  acceptance:
    - id: AC-0001
      statement: An invalid skill name exits with code 1.
    - id: AC-0002
      statement: An invalid skill name prints an Error-prefixed stderr message.

- id: RUN-FR-0004
  title: CLI rejects missing project root
  status: active
  description: >
    The CLI fails when no `.skillrouter/` directory is found ascending from
    the current directory.
  acceptance:
    - id: AC-0001
      statement: A missing project root exits with code 1.
    - id: AC-0002
      statement: A missing project root prints an Error-prefixed stderr message.

- id: RUN-FR-0005
  title: CLI rejects missing skill templates
  status: active
  description: >
    The CLI fails when the requested skill does not have a template file at
    `.skillrouter/<skill>/SKILL.template.md`.
  acceptance:
    - id: AC-0001
      statement: A missing skill template exits with code 1.
    - id: AC-0002
      statement: A missing skill template prints an Error-prefixed stderr message.
