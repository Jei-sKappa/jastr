id: generate-check-stale
covers:
  - GEN-FR-0014.AC-0001
  - GEN-FR-0014.AC-0002
  - GEN-FR-0014.AC-0003
title: Check a stale agent-skill
description: Shows how --check reports a committed wrapper whose bytes differ as stale, writing nothing.
command: ["generate", "agent-skill", "demo", "--out=out/SKILL.md", "--check"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: Generated agent-skill at out/SKILL.md is stale; regenerate it with jastr generate agent-skill demo --out out/SKILL.md --force.\n"
  files:
    out/SKILL.md: expected/files/out/SKILL.md
