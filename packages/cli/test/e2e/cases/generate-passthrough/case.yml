id: generate-passthrough
covers:
  - GEN-FR-0007.AC-0001
  - GEN-FR-0007.AC-0002
  - GEN-FR-0007.AC-0003
  - GEN-FR-0011.AC-0002
title: Generate passes through frontmatter
description: Shows how generate preserves author frontmatter fields and omits Jastr-owned inputs.
command: ["generate", "agent-skill", "demo", "--out=out/SKILL.md"]
expect:
  exitCode: 0
  stdout: "Generated `out/SKILL.md` from template `.jastr/demo/TEMPLATE.md`"
  stderr: ""
  files:
    out/SKILL.md: expected/files/out/SKILL.md
  fileContains:
    out/SKILL.md:
      - "license: MIT"
      - "my-extension-field: custom-value"
  fileNotContains:
    out/SKILL.md:
      - "inputs:"
      - "language:"
