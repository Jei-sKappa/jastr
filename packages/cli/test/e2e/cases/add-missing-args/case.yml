id: add-missing-args
covers:
  - ADD-FR-0014.AC-0001
title: Add with a missing name is an invalid_command
description: >
  add requires both a `<repo-source>` and a `<name>`; a single positional fails with
  invalid_command before any filesystem access.
command: ["add", "./source"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: Missing template name for add.\n"
