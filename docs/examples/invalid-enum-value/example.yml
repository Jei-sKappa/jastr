id: invalid-enum-value
title: Invalid Enum Value
description: Shows Skillrouter input validation errors.
cwd: project
command: ["run", "demo", "--language=ruby"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: Invalid value ruby for --language. Expected one of: typescript, python.\n"
render:
  show:
    - kind: command
      label: Command
      language: bash
    - kind: stderr
      label: Error
      language: txt
hidden: true
