id: generate-invalid-field
covers:
  - GEN-FR-0008.AC-0001
  - GEN-FR-0008.AC-0002
title: Generate rejects non-kebab frontmatter fields
description: Shows how generate rejects an extension frontmatter field that is not kebab-case.
cwd: project
command: ["generate", "demo", "--out=out/SKILL.md"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: Generated skill frontmatter field BadField must be kebab-case.\n"
