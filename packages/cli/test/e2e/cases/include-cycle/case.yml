id: include-cycle
covers:
  - INCLUDE-FR-0004.AC-0001
  - INCLUDE-FR-0004.AC-0002
title: Reject include cycles
description: Shows how circular includes are detected and rejected.
cwd: project
command: ["run", "demo"]
expect:
  exitCode: 1
  stdout: ""
  stderr: "Error: Include cycle detected: {{projectRoot}}/.jastr/demo/a.md -> {{projectRoot}}/.jastr/demo/b.md -> {{projectRoot}}/.jastr/demo/a.md.\n"
